id: apeshift-manual-priority-fee
language: Python
message: Flag Brownie priority_fee usage for manual Ape provider fee configuration.
severity: warning
rule:
  any:
    - pattern: from brownie.network import priority_fee
    - pattern: priority_fee($$$ARGS)
fix: "# TODO(apeshift): replace Brownie priority_fee with Ape provider fee configuration"
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "manual-review"
---
id: apeshift-manual-import-time-provider
language: Python
message: Flag import-time provider access; Ape providers may not be connected during test collection.
severity: warning
rule:
  pattern: networks.provider.network.name
  not:
    inside:
      kind: function_definition
      stopBy: end
fix: "networks.provider.network.name  # TODO(apeshift): move provider access inside a function or connected Ape script"
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/scripts.html"
metadata:
  transformGroup: "manual-review"
