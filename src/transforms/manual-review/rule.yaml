id: apeshift-manual-web3-contract
language: Python
message: Flag web3.eth.contract for manual Ape contract migration.
severity: warning
rule:
  pattern: web3.eth.contract($$$ARGS)
fix: "web3.eth.contract($$$ARGS)  # TODO(apeshift): replace with ape contract pattern"
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "manual-review"
---
id: apeshift-manual-positional-events
language: Python
message: Flag positional event access for manual Ape event migration.
severity: warning
rule:
  pattern: tx.events[0][$FIELD]
fix: "tx.events[0][$FIELD]  # TODO(apeshift): use tx.events.filter(Contract.EventName)[0].field"
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "manual-review"
---
id: apeshift-manual-vm-error
language: Python
message: Flag complex Brownie VirtualMachineError access for manual Ape exception migration.
severity: warning
rule:
  pattern: exceptions.VirtualMachineError
fix: "exceptions.VirtualMachineError  # TODO(apeshift): verify ContractLogicError replacement"
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/latest/userguides/testing.html"
metadata:
  transformGroup: "manual-review"
