id: apeshift-sender-dict-deploy-from
language: Python
message: Replace Brownie deploy sender dict with Ape sender keyword.
severity: warning
rule:
  pattern: $CONTRACT.deploy($$$ARGS, {'from': $ACCOUNT})
constraints:
  ACCOUNT:
    kind: identifier
fix: $CONTRACT.deploy($$$ARGS, sender=$ACCOUNT)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
---
