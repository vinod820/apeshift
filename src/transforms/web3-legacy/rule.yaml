id: apeshift-web3-eth-legacy
language: Python
message: Replace exact Brownie web3.eth accessors with Ape provider/network accessors.
severity: warning
rule:
  any:
    - pattern: web3.eth.getBalance($ADDR)
    - pattern: web3.eth.blockNumber
    - pattern: web3.eth.chainId
fix: provider.get_balance($ADDR)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  zeroFalsePositivePolicy: "Only exact legacy spellings are transformed; dynamic web3.eth usage is left for manual review."
  transformGroup: "web3"
---
id: apeshift-web3-get-balance
language: Python
message: Replace web3.eth.getBalance with provider.get_balance.
severity: warning
rule:
  pattern: web3.eth.getBalance($ADDR)
fix: provider.get_balance($ADDR)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "web3"
---
id: apeshift-web3-block-number
language: Python
message: Replace web3.eth.blockNumber with Ape chain head number.
severity: warning
rule:
  pattern: web3.eth.blockNumber
fix: chain.blocks.head.number
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "web3"
---
id: apeshift-web3-chain-id
language: Python
message: Replace web3.eth.chainId with Ape network chain id.
severity: warning
rule:
  pattern: web3.eth.chainId
fix: networks.provider.network.chain_id
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "web3"
