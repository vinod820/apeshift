id: apeshift-web3-eth-legacy
language: Python
message: Replace exact Brownie web3.eth accessors with Ape provider/network accessors.
severity: warning
rule:
  any:
    - pattern: web3.eth.getBalance($ADDR)
    - pattern: web3.eth.blockNumber
    - pattern: web3.eth.chainId
fix: provider.get_balance($ADDR)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  zeroFalsePositivePolicy: "Only exact legacy spellings are transformed; dynamic web3.eth usage is left for manual review."
