id: apeshift-brownie-event-dict
language: Python
message: Replace exact Brownie event dict access with Ape event filters.
severity: warning
rule:
  any:
    - pattern: tx.events[$EVENT][0][$FIELD]
    - pattern: len(tx.events[$EVENT])
fix: tx.events.filter(contract.$EVENT)[0].$FIELD
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  zeroFalsePositivePolicy: "Only tx.events string-literal event names are transformed; unknown receiver names remain unchanged."
  transformGroup: "events"
---
id: apeshift-event-dict-value
language: Python
message: Replace exact Brownie event field lookup with Ape event filter lookup.
severity: warning
rule:
  pattern: tx.events[$EVENT][0][$FIELD]
fix: tx.events.filter(contract.$EVENT)[0].$FIELD
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "events"
  zeroFalsePositivePolicy: "Only exact tx.events dictionary access is documented as deterministic; positional events are TODO-only."
---
id: apeshift-event-dict-len
language: Python
message: Replace exact Brownie event count lookup with Ape event filter length.
severity: warning
rule:
  pattern: len(tx.events[$EVENT])
fix: len(tx.events.filter(contract.$EVENT))
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "events"
