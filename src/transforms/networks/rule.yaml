id: apeshift-network-show-active
language: Python
message: Replace Brownie active-network helper with Ape provider network name.
severity: warning
rule:
  pattern: network.show_active()
fix: networks.provider.network.name
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "networks"
---
id: apeshift-brownie-network-import
language: Python
message: Replace Brownie network import with Ape networks import.
severity: warning
rule:
  any:
    - pattern: from brownie import network
    - pattern: import brownie.network as network
fix: from ape import networks
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/networks.html"
metadata:
  transformGroup: "networks"
