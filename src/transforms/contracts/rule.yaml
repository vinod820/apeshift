id: apeshift-contract-deploy-project
language: Python
message: Replace Brownie contract deploy with Ape project contract deploy.
severity: warning
rule:
  pattern: $CONTRACT.deploy($$$ARGS)
constraints:
  CONTRACT:
    regex: "^[A-Z][A-Za-z0-9_]*$"
fix: project.$CONTRACT.deploy($$$ARGS)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "contracts"
---
id: apeshift-contract-deployment-index
language: Python
message: Replace Brownie latest deployment lookup with Ape project deployments lookup.
severity: warning
rule:
  pattern: $CONTRACT[-1]
constraints:
  CONTRACT:
    regex: "^[A-Z][A-Za-z0-9_]*$"
fix: project.$CONTRACT.deployments[-1]
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "contracts"
---
id: apeshift-interface-at
language: Python
message: Replace Brownie interface constructor with Ape project contract attachment.
severity: warning
rule:
  pattern: interface.$CONTRACT($ADDRESS)
fix: project.$CONTRACT.at($ADDRESS)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/userguides/contracts.html"
metadata:
  transformGroup: "contracts"
