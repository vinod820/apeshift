id: apeshift-brownie-reverts
language: Python
message: Replace brownie.reverts with ape.reverts.
severity: warning
rule:
  pattern: brownie.reverts($$$ARGS)
fix: ape.reverts($$$ARGS)
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/latest/userguides/testing.html"
---
id: apeshift-bare-reverts-import
language: Python
message: Replace bare Brownie reverts import with Ape reverts import.
severity: warning
rule:
  pattern: from brownie import reverts
fix: from ape import reverts
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/latest/userguides/testing.html"
