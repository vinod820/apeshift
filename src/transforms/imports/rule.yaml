id: apeshift-brownie-imports
language: Python
message: Convert safe Brownie imports to Ape imports.
severity: warning
rule:
  pattern: from brownie import $$$NAMES
fix: from ape import $$$NAMES
files:
  - "**/*.py"
url: "https://docs.apeworx.io/ape/stable/methoddocs/ape.html"
metadata:
  transformGroup: "imports"
  zeroFalsePositivePolicy: "The TypeScript transform only rewrites names that are known safe Ape exports; wildcard imports become TODO comments."
