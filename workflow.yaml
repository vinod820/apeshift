version: "1"

params:
  schema:
    target:
      name: Target
      description: Brownie project directory to migrate.
      type: string
      default: "."

nodes:
  - id: apeshift-migrate
    name: Self-sufficient Brownie to Ape migration with ApeShift validation
    type: automatic
    steps:
      - name: "ApeShift multiline imports transform"
        ast-grep:
          config_file: "src/transforms/imports-multiline/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift accounts sender dict transform"
        ast-grep:
          config_file: "src/transforms/accounts/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift contracts transform"
        ast-grep:
          config_file: "src/transforms/contracts/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift networks transform"
        ast-grep:
          config_file: "src/transforms/networks/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift reverts transform"
        ast-grep:
          config_file: "src/transforms/reverts/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift exceptions transform"
        ast-grep:
          config_file: "src/transforms/exceptions/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift web3 legacy transform"
        ast-grep:
          config_file: "src/transforms/web3-legacy/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift events transform"
        ast-grep:
          config_file: "src/transforms/events/rule.yaml"
          include:
            - "**/*.py"
      - name: "ApeShift manual review TODO transform"
        ast-grep:
          config_file: "src/transforms/manual-review/rule.yaml"
          include:
            - "**/*.py"
            - "**/*.yaml"
            - "**/*.yml"
      - name: "ApeShift config transform"
        ast-grep:
          config_file: "src/transforms/config/rule.yaml"
          include:
            - "**/*.yaml"
            - "**/*.yml"
